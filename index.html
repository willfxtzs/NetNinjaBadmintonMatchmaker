<!DOCTYPE html>
<html>
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1d1d1d">
  <meta charset="UTF-8">
  <title>Net Ninjas Badminton Matchmaker</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    .section { margin-bottom: 20px; }
    .court {
      border: 2px solid #000;
      padding: 10px;
      margin-bottom: 10px;
      min-height: 80px;
    }
    .player {
      display: inline-block;
      border: 1px solid #333;
      padding: 4px 8px;
      margin: 4px;
      background: #eee;
    }
    .draggable { cursor: grab; }
    .dropzone {
      min-height: 30px;
      padding: 6px;
      border: 1px dashed #999;
      margin-top: 6px;
    }
    button { margin: 2px; }
  </style>
</head>
<body>

<h1>Net Ninjas Badminton Matchmaker</h1>

<div class="section">
  <input id="playerInput" placeholder="Player name">
  <button onclick="addPlayer()">Add Player</button>
</div>

<!-- DEFAULT QUEUE -->
<div class="section">
  <h3>Queue</h3>
  <button onclick="clearQueue()">Clear Queue</button>
  <div id="queue" class="dropzone"
       ondragover="allowDrop(event)"
       ondrop="dropToQueue(event)">
  </div>
</div>

<!-- BEGINNER QUEUE -->
<div class="section">
  <h3>Beginner Queue</h3>
  <button onclick="clearBeginnerQueue()">Clear Beginner Queue</button>
  <div id="beginnerQueue" class="dropzone"
       ondragover="allowDrop(event)"
       ondrop="dropToBeginner(event)">
  </div>
</div>

<!-- ADVANCE QUEUE -->
<div class="section">
  <h3>Advance Queue</h3>
  <button onclick="clearAdvanceQueue()">Clear Advance Queue</button>
  <div id="advanceQueue" class="dropzone"
       ondragover="allowDrop(event)"
       ondrop="dropToAdvance(event)">
  </div>
</div>

<div class="section">
  <button onclick="addCourt()">Add Court</button>
  <button onclick="removeCourt()">Remove Court</button>
  <button onclick="clearAllCourts()">Clear All Courts Players</button>
</div>

<div class="section">
  <h3>Courts</h3>
  <div id="courts"></div>
</div>

<script>

/* ========= STATE ========= */

let queue = [];
let beginnerQueue = [];
let advanceQueue = [];

let courts = [
  { mode: "2v2", level: "default", players: [] },
  { mode: "2v2", level: "default", players: [] }
];

// Tracks players who sat out the PREVIOUS random for each court (by court index)
// Structure: { [courtIndex]: string[] }
let sittingOut = {};

let draggedPlayer = null;
let draggedFromCourt = null;

/* ========= INPUT ========= */

document.getElementById("playerInput")
  .addEventListener("keydown", e => {
    if (e.key === "Enter") addPlayer();
  });

/* ========= HELPERS ========= */

function returnPlayerToLevel(player, level) {
  if (level === "beginner") {
    if (!beginnerQueue.includes(player)) beginnerQueue.push(player);
  } else if (level === "advance") {
    if (!advanceQueue.includes(player)) advanceQueue.push(player);
  } else {
    if (!queue.includes(player)) queue.push(player);
  }
}

function getSourceQueue(level) {
  if (level === "beginner") return beginnerQueue;
  if (level === "advance") return advanceQueue;
  return queue;
}

/* ========= ACTIONS ========= */

function addPlayer() {
  const input = document.getElementById("playerInput");
  const name = input.value.trim();
  if (!name) return;
  queue.push(name);
  input.value = "";
  render();
}

function removeQueuePlayer(index) {
  const removed = queue.splice(index, 1)[0];
  beginnerQueue = beginnerQueue.filter(p => p !== removed);
  advanceQueue = advanceQueue.filter(p => p !== removed);
  render();
}

function addCourt() {
  courts.push({ mode: "2v2", level: "default", players: [] });
  render();
}

function removeCourt() {
  const court = courts.pop();
  if (court) {
    court.players.forEach(p => returnPlayerToLevel(p, court.level));
  }
  render();
}

function setMode(index, mode) {
  const court = courts[index];
  // Return current players to their queue before changing mode
  court.players.forEach(p => returnPlayerToLevel(p, court.level));
  court.players = [];
  court.mode = mode;
  // Clear sitting-out memory for this court since lineup is reset
  delete sittingOut[index];
  render();
}

// FIX 1: When the level changes, return existing court players to the OLD level's queue,
// then update the level. Players are NOT wiped — they go back to the correct queue.
function setLevel(index, newLevel) {
  const court = courts[index];
  const oldLevel = court.level;

  if (oldLevel !== newLevel) {
    // Return players currently on the court to the OLD level's queue
    court.players.forEach(p => returnPlayerToLevel(p, oldLevel));
    court.players = [];
    // Clear sitting-out memory since context changed
    delete sittingOut[index];
  }

  court.level = newLevel;
  render();
}

// FIX 2: Smart random — prioritise players who sat out last match,
// then fill remaining spots from previous-match players (with occasional mixing).
function randomAssign(index) {
  const court = courts[index];
  const needed = court.mode === "1v1" ? 2 : 4;
  const source = getSourceQueue(court.level);

  // Players currently on the court (previous match participants)
  const prevPlayers = [...court.players];

  // Return everyone on the court back to their queue before reassigning
  court.players.forEach(p => returnPlayerToLevel(p, court.level));
  court.players = [];

  // Players who sat out last round for THIS court
  const waitingPlayers = (sittingOut[index] || []).filter(p => source.includes(p));

  // --- Build the new lineup ---
  let chosen = [];

  if (waitingPlayers.length >= needed) {
    // Enough waiting players to fill the court — pick `needed` of them randomly
    const waitingCopy = [...waitingPlayers];
    shuffle(waitingCopy);
    chosen = waitingCopy.slice(0, needed);
  } else if (waitingPlayers.length > 0) {
    // Start with all waiting players, then fill from a mix of prev players + others in queue
    chosen = [...waitingPlayers];
    const stillNeeded = needed - chosen.length;

    // Pool: prev match players still in queue (excluding waiting players already chosen)
    const prevInQueue = prevPlayers.filter(p => source.includes(p) && !chosen.includes(p));

    // Occasionally rotate 1 prev-match player out in favour of a fresh queue player
    // to prevent the same group from always playing together.
    // "Occasionally" = ~30% chance per extra slot when there are fresh players available
    const freshInQueue = source.filter(p => !prevInQueue.includes(p) && !chosen.includes(p));

    let pool = [...prevInQueue];
    if (freshInQueue.length > 0 && pool.length > 0 && stillNeeded >= 2) {
      // Randomly decide to swap one prev-match player for a fresh one
      if (Math.random() < 0.35) {
        // Remove one random prev-match player from pool (they go back to queue naturally)
        const swapOutIdx = Math.floor(Math.random() * pool.length);
        pool.splice(swapOutIdx, 1);
        // Add one random fresh player
        shuffle(freshInQueue);
        pool.push(freshInQueue[0]);
      }
    }

    // If pool is still short, top up with any remaining source players
    const fallback = source.filter(p => !chosen.includes(p) && !pool.includes(p));
    shuffle(fallback);
    const fullPool = [...pool, ...fallback];
    shuffle(fullPool);

    chosen = [...chosen, ...fullPool.slice(0, stillNeeded)];
  } else {
    // No sitting-out memory (first random or cleared) — fully random from source
    const sourceCopy = [...source];
    shuffle(sourceCopy);
    chosen = sourceCopy.slice(0, needed);
  }

  // Remove chosen players from the source queue
  chosen.forEach(p => {
    const idx = source.indexOf(p);
    if (idx !== -1) source.splice(idx, 1);
  });

  court.players = chosen;

  // Update sitting-out: players who were in the prev match but NOT chosen this round
  // These are the priority players for the NEXT random click
  sittingOut[index] = prevPlayers.filter(p => !chosen.includes(p) && source.includes(p));

  render();
}

function removePlayerFromCourt(courtIndex, playerIndex) {
  const court = courts[courtIndex];
  const player = court.players.splice(playerIndex, 1)[0];
  returnPlayerToLevel(player, court.level);
  render();
}

function clearCourt(index) {
  const court = courts[index];
  // FIX 1 (clear court): return players to their queue instead of wiping them
  court.players.forEach(p => returnPlayerToLevel(p, court.level));
  court.players = [];
  delete sittingOut[index];
  render();
}

function clearAllCourts() {
  courts.forEach((court, i) => {
    court.players.forEach(p => returnPlayerToLevel(p, court.level));
    court.players = [];
    delete sittingOut[i];
  });
  render();
}

function clearQueue() {
  queue = [];
  beginnerQueue = [];
  advanceQueue = [];
  render();
}

function clearBeginnerQueue() {
  beginnerQueue = [];
  render();
}

function clearAdvanceQueue() {
  advanceQueue = [];
  render();
}

/* ========= DRAG & DROP ========= */

function dragStart(player, courtIndex = null) {
  draggedPlayer = player;
  draggedFromCourt = courtIndex;
}

function allowDrop(e) {
  e.preventDefault();
}

function dropToQueue(e) {
  e.preventDefault();

  if (draggedFromCourt !== null) {
    const court = courts[draggedFromCourt];
    court.players = court.players.filter(p => p !== draggedPlayer);
    returnPlayerToLevel(draggedPlayer, "default");
  }

  draggedPlayer = draggedFromCourt = null;
  render();
}

function dropToBeginner(e) {
  e.preventDefault();
  if (!beginnerQueue.includes(draggedPlayer)) {
    beginnerQueue.push(draggedPlayer);
    advanceQueue = advanceQueue.filter(p => p !== draggedPlayer);
  }
  draggedPlayer = draggedFromCourt = null;
  render();
}

function dropToAdvance(e) {
  e.preventDefault();
  if (!advanceQueue.includes(draggedPlayer)) {
    advanceQueue.push(draggedPlayer);
    beginnerQueue = beginnerQueue.filter(p => p !== draggedPlayer);
  }
  draggedPlayer = draggedFromCourt = null;
  render();
}

function dropToCourt(e, index) {
  e.preventDefault();
  const court = courts[index];
  const max = court.mode === "1v1" ? 2 : 4;
  if (court.players.length >= max) return;

  if (draggedFromCourt !== null) {
    courts[draggedFromCourt].players =
      courts[draggedFromCourt].players.filter(p => p !== draggedPlayer);
  } else {
    queue = queue.filter(p => p !== draggedPlayer);
    beginnerQueue = beginnerQueue.filter(p => p !== draggedPlayer);
    advanceQueue = advanceQueue.filter(p => p !== draggedPlayer);
  }

  court.players.push(draggedPlayer);
  draggedPlayer = draggedFromCourt = null;
  render();
}

/* ========= UTIL ========= */

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/* ========= RENDER ========= */

function render() {

  const queueDiv = document.getElementById("queue");
  queueDiv.innerHTML = "";
  queue.forEach((p, i) => {
    const span = document.createElement("span");
    span.className = "player draggable";
    span.draggable = true;
    span.ondragstart = () => dragStart(p);
    span.innerHTML = `
      ${p}
      <button onclick="removeQueuePlayer(${i})">X</button>
    `;
    queueDiv.appendChild(span);
  });

  const beginnerDiv = document.getElementById("beginnerQueue");
  beginnerDiv.innerHTML = "";
  beginnerQueue.forEach(p => {
    const span = document.createElement("span");
    span.className = "player draggable";
    span.draggable = true;
    span.ondragstart = () => dragStart(p);
    span.innerHTML = `${p}`;
    beginnerDiv.appendChild(span);
  });

  const advanceDiv = document.getElementById("advanceQueue");
  advanceDiv.innerHTML = "";
  advanceQueue.forEach(p => {
    const span = document.createElement("span");
    span.className = "player draggable";
    span.draggable = true;
    span.ondragstart = () => dragStart(p);
    span.innerHTML = `${p}`;
    advanceDiv.appendChild(span);
  });

  const courtsDiv = document.getElementById("courts");
  courtsDiv.innerHTML = "";

  courts.forEach((court, i) => {
    const div = document.createElement("div");
    div.className = "court";
    div.ondragover = allowDrop;
    div.ondrop = e => dropToCourt(e, i);

    const waitingLabel = sittingOut[i] && sittingOut[i].length
      ? `<small style="color:#888">⏳ Priority next: ${sittingOut[i].join(", ")}</small><br>`
      : "";

    div.innerHTML = `
      <strong>Court ${i + 1}</strong><br>
      Mode:
      <select onchange="setMode(${i}, this.value)">
        <option value="1v1" ${court.mode === "1v1" ? "selected" : ""}>1v1</option>
        <option value="2v2" ${court.mode === "2v2" ? "selected" : ""}>2v2</option>
      </select>
      Level:
      <select onchange="setLevel(${i}, this.value)">
        <option value="default" ${court.level === "default" ? "selected" : ""}>Default Queue</option>
        <option value="beginner" ${court.level === "beginner" ? "selected" : ""}>Beginner</option>
        <option value="advance" ${court.level === "advance" ? "selected" : ""}>Advance</option>
      </select>
      <button onclick="randomAssign(${i})">Random</button>
      <button onclick="clearCourt(${i})">Clear Court</button>
      <br>${waitingLabel}
      <div class="dropzone">
        ${court.players.map((p, j) =>
          `<div class="player draggable" draggable="true"
             ondragstart="dragStart('${p}', ${i})">
             ${p}
             <button onclick="removePlayerFromCourt(${i}, ${j})">X</button>
           </div>`
        ).join("")}
      </div>
    `;
    courtsDiv.appendChild(div);
  });
}

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
